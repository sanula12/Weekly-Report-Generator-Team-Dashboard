spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/report_app
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: your-super-secret-key-minimum-32-chars-long
    expiration: 86400000

server:
  port: 8080